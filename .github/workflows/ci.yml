name: CI

# Fast, deterministic checks on every pull request (and pushes to main):
# guest-golden verification, host-side unit tests, and a hypervisor build.
#
# The QEMU integration suite (make test-integration) is intentionally NOT run
# here: it boots the EL2 hypervisor with a full Linux guest, which needs KVM /
# nested virtualization to complete in reasonable time. GitHub-hosted runners
# have no acceleration for this workload (pure TCG), so it is run locally or on
# an accelerated/self-hosted host instead. See tests/integration/.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Toolchain: aarch64 cross-compiler builds the hypervisor; python3 runs
      # the golden verifier. (No QEMU needed — no boots run in CI.)
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu python3

      # Verify the committed guest images (linux, rtos, android) against their
      # Phase 2 goldens. Bit-reproducible: verifies committed blobs, no rebuild.
      - name: make check-guests
        run: make check-guests

      # Host-side unit tests (compiled with the native gcc, -DUNIT_TEST).
      - name: make test-unit
        run: make test-unit

      # Build the hypervisor ELF — confirms the full image compiles and links.
      - name: Build hypervisor ELF
        run: make qemu
