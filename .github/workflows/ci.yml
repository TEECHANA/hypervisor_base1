name: CI

# Fast, deterministic checks on every pull request (and pushes to main):
# guest-golden verification, host-side unit tests, and a hypervisor build.
#
# The full QEMU integration suite (make test-integration) runs in the separate
# .github/workflows/integration.yml — also on every pull request, plus nightly.
# It boots the EL2 hypervisor + guests under pure TCG (hosted runners have no
# KVM) and still completes in ~1.5 min, because boot_capture stops at the
# quarantine/failover point rather than waiting for full Linux userspace.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Toolchain: aarch64 cross-compiler builds the hypervisor; python3 runs
      # the golden verifier. (No QEMU needed — no boots run in CI.)
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu python3

      # Verify the committed guest images (linux, rtos, android) against their
      # Phase 2 goldens. Bit-reproducible: verifies committed blobs, no rebuild.
      - name: make check-guests
        run: make check-guests

      # Host-side unit tests (compiled with the native gcc, -DUNIT_TEST).
      - name: make test-unit
        run: make test-unit

      # Fail-closed guard: with no VSE_PW_VERIFIER, the build MUST fail at the
      # pw_verifier.h #error (no default operator password is shipped). If this
      # ever succeeds, the fail-closed guarantee has regressed.
      - name: Assert build fails closed without VSE_PW_VERIFIER
        run: |
          if make qemu >build.log 2>&1; then
            echo "REGRESSION: build succeeded without VSE_PW_VERIFIER"; exit 1
          fi
          grep -q "VSE_PW_VERIFIER is unset" build.log \
            || { echo "Build failed, but NOT at the pw_verifier.h #error:"; tail -20 build.log; exit 1; }
          echo "OK: fail-closed #error fired as expected"

      # Build the hypervisor ELF with the injected changeme test verifier —
      # confirms the full image compiles and links. Same script a deployment uses.
      - name: Build hypervisor ELF
        run: |
          make clean
          make qemu EXTRA_CFLAGS=-DVSE_PW_VERIFIER=$(python3 scripts/totp_gen.py --pw-define changeme)
